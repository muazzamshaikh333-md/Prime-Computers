<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard | Prime Computers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:       #020912;
    --bg-dark:       #060f1e;
    --bg-card:       rgba(6, 20, 45, 0.75);
    --bg-glass:      rgba(0, 180, 255, 0.06);
    --neon:          #00d4ff;
    --neon-dim:      rgba(0, 212, 255, 0.15);
    --neon-glow:     0 0 20px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2);
    --neon2:         #0066ff;
    --accent-mid:    #0099dd;
    --white:         #f0f8ff;
    --white-dim:     rgba(240,248,255,0.7);
    --white-faint:   rgba(240,248,255,0.12);
    --border:        rgba(0,212,255,0.15);
    --border-bright: rgba(0,212,255,0.4);
    --font-display:  'Orbitron', monospace;
    --font-body:     'Rajdhani', sans-serif;
    --radius:        12px;
    --radius-lg:     20px;
    --transition:    0.25s ease;
    --green: #00e29a;
    --yellow: #ffcb3d;
    --red: #ff5577;
    --blue: #4da9ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    background-image: radial-gradient(circle at 20% 0%, rgba(0,102,255,0.12), transparent 50%),
                       radial-gradient(circle at 80% 100%, rgba(0,212,255,0.08), transparent 50%);
    color: var(--white);
    min-height: 100vh;
    padding: 24px;
  }
  h1, h2 { font-family: var(--font-display); }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
    margin-bottom: 28px;
  }
  .topbar h1 {
    font-size: 1.5rem; letter-spacing: 1px;
    background: linear-gradient(90deg, var(--neon), var(--neon2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .topbar h1 span { color: var(--white); -webkit-text-fill-color: var(--white); }

  /* ── Login screen ── */
  #loginScreen {
    max-width: 380px; margin: 12vh auto; padding: 32px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); text-align: center;
  }
  #loginScreen i { font-size: 2.2rem; color: var(--neon); margin-bottom: 12px; }
  #loginScreen input {
    width: 100%; margin-top: 18px; padding: 12px 14px;
    background: var(--bg-glass); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--white); font-family: var(--font-body); font-size: 1rem;
  }
  #loginScreen input:focus { outline: none; border-color: var(--neon); }
  #loginErr { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }

  button {
    cursor: pointer; border: none; font-family: var(--font-body); font-weight: 600;
  }
  .btn-primary {
    width: 100%; margin-top: 16px; padding: 12px; border-radius: var(--radius);
    background: linear-gradient(90deg, var(--neon2), var(--neon)); color: #021018; font-size: 1rem;
    transition: var(--transition);
  }
  .btn-primary:hover { filter: brightness(1.1); }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; text-align: center;
  }
  .stat-card .num { font-family: var(--font-display); font-size: 1.6rem; color: var(--neon); }
  .stat-card .label { font-size: 0.8rem; color: var(--white-dim); margin-top: 4px; }

  /* ── Filters ── */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .filters input, .filters select {
    background: var(--bg-glass); border: 1px solid var(--border); color: var(--white);
    padding: 9px 12px; border-radius: var(--radius); font-family: var(--font-body); font-size: 0.9rem;
  }
  .filters input { flex: 1; min-width: 180px; }

  /* ── Cards grid ── */
  #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .req-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 18px; transition: var(--transition);
  }
  .req-card:hover { border-color: var(--border-bright); }
  .req-card .row1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .req-card .reqid { font-family: var(--font-display); font-size: 0.85rem; color: var(--neon); }
  .req-card .time { font-size: 0.75rem; color: var(--white-dim); margin-top: 2px; }
  .req-card h3 { font-size: 1.15rem; margin-top: 10px; }
  .req-card .meta { font-size: 0.85rem; color: var(--white-dim); margin-top: 4px; }
  .req-card .specs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
  }
  .chip {
    font-size: 0.72rem; padding: 4px 9px; border-radius: 20px;
    background: var(--bg-glass); border: 1px solid var(--border); color: var(--white-dim);
  }
  .req-card .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .req-card select.status {
    flex: 1; padding: 8px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--bg-dark); color: var(--white); font-family: var(--font-body); font-size: 0.85rem;
  }
  .icon-btn {
    background: var(--bg-glass); border: 1px solid var(--border); color: var(--white);
    width: 36px; height: 36px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .icon-btn:hover { border-color: var(--neon); color: var(--neon); }
  .icon-btn.danger:hover { border-color: var(--red); color: var(--red); }

  .status-badge {
    font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px;
  }
  .status-Pending { background: rgba(255,203,61,0.15); color: var(--yellow); }
  .status-In.Progress, .status-InProgress { background: rgba(77,169,255,0.15); color: var(--blue); }
  .status-Ready { background: rgba(0,226,154,0.15); color: var(--green); }
  .status-Completed { background: rgba(0,226,154,0.25); color: var(--green); }
  .status-Cancelled { background: rgba(255,85,119,0.15); color: var(--red); }

  #emptyState, #loadingState { text-align: center; padding: 60px 20px; color: var(--white-dim); }
  #emptyState i, #loadingState i { font-size: 2.5rem; color: var(--neon); margin-bottom: 10px; display: block; }

  .hidden { display: none !important; }
</style>
</head>
<body>

  <!-- ── LOGIN SCREEN ── -->
  <div id="loginScreen">
    <i class="fas fa-shield-halved"></i>
    <h2>Admin Login</h2>
    <p style="color:var(--white-dim); font-size:0.85rem; margin-top:6px;">Enter your admin key to view print requests</p>
    <input type="password" id="adminKeyInput" placeholder="Admin Key" />
    <div id="loginErr"><i class="fas fa-triangle-exclamation"></i> Invalid key. Check your .env ADMIN_KEY.</div>
    <button class="btn-primary" id="loginBtn"><i class="fas fa-unlock"></i> Login</button>
  </div>

  <!-- ── DASHBOARD (hidden until logged in) ── -->
  <div id="dashboard" class="hidden">
    <div class="topbar">
      <h1><span>PRIME COMPUTERS</span> // Admin Dashboard</h1>
      <div style="display:flex; gap:10px;">
        <button class="icon-btn" id="refreshBtn" title="Refresh"><i class="fas fa-rotate"></i></button>
        <button class="icon-btn danger" id="logoutBtn" title="Logout"><i class="fas fa-right-from-bracket"></i></button>
      </div>
    </div>

    <div class="stats" id="statsRow"></div>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="Search by name, phone, or request ID..." />
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Ready">Ready</option>
        <option value="Completed">Completed</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>

    <div id="loadingState"><i class="fas fa-spinner fa-spin"></i>Loading requests...</div>
    <div id="emptyState" class="hidden"><i class="fas fa-inbox"></i>No print requests found.</div>
    <div id="cards"></div>
  </div>

<script>
  // Change this if you deploy the backend elsewhere
  const BACKEND_URL = 'http://localhost:5000';

  let allRequests = [];
  let adminKey = sessionStorage.getItem('pc_admin_key') || '';

  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');

  if (adminKey) showDashboard();

  document.getElementById('loginBtn').addEventListener('click', attemptLogin);
  document.getElementById('adminKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptLogin();
  });

  async function attemptLogin() {
    const key = document.getElementById('adminKeyInput').value.trim();
    if (!key) return;
    adminKey = key;
    const ok = await fetchRequests();
    if (ok) {
      sessionStorage.setItem('pc_admin_key', key);
      showDashboard();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function showDashboard() {
    loginScreen.classList.add('hidden');
    dashboard.classList.remove('hidden');
    fetchRequests();
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('pc_admin_key');
    adminKey = '';
    dashboard.classList.add('hidden');
    loginScreen.classList.remove('hidden');
  });

  document.getElementById('refreshBtn').addEventListener('click', fetchRequests);
  document.getElementById('searchInput').addEventListener('input', renderCards);
  document.getElementById('statusFilter').addEventListener('change', renderCards);

  async function fetchRequests() {
    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('cards').innerHTML = '';
    document.getElementById('emptyState').classList.add('hidden');
    try {
      const res = await fetch(`${BACKEND_URL}/api/print-requests`, {
        headers: { 'x-admin-key': adminKey }
      });
      if (res.status === 401) return false;
      const result = await res.json();
      if (!result.success) return false;
      allRequests = result.data;
      renderStats();
      renderCards();
      return true;
    } catch (err) {
      console.error(err);
      return false;
    } finally {
      document.getElementById('loadingState').classList.add('hidden');
    }
  }

  function renderStats() {
    const counts = { Pending: 0, 'In Progress': 0, Ready: 0, Completed: 0, Cancelled: 0 };
    allRequests.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
    const statsRow = document.getElementById('statsRow');
    statsRow.innerHTML = `
      <div class="stat-card"><div class="num">${allRequests.length}</div><div class="label">Total</div></div>
      <div class="stat-card"><div class="num" style="color:var(--yellow)">${counts.Pending}</div><div class="label">Pending</div></div>
      <div class="stat-card"><div class="num" style="color:var(--blue)">${counts['In Progress']}</div><div class="label">In Progress</div></div>
      <div class="stat-card"><div class="num" style="color:var(--green)">${counts.Ready}</div><div class="label">Ready</div></div>
      <div class="stat-card"><div class="num" style="color:var(--green)">${counts.Completed}</div><div class="label">Completed</div></div>
    `;
  }

  function renderCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const statusF = document.getElementById('statusFilter').value;

    const filtered = allRequests.filter(r => {
      const matchesSearch = !search ||
        r.customerName.toLowerCase().includes(search) ||
        r.customerPhone.includes(search) ||
        r.requestId.toLowerCase().includes(search);
      const matchesStatus = !statusF || r.status === statusF;
      return matchesSearch && matchesStatus;
    });

    const cardsEl = document.getElementById('cards');
    document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

    cardsEl.innerHTML = filtered.map(r => `
      <div class="req-card">
        <div class="row1">
          <div>
            <div class="reqid">${r.requestId}</div>
            <div class="time">${new Date(r.createdAt).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })}</div>
          </div>
          <span class="status-badge status-${r.status.replace(' ', '')}">${r.status}</span>
        </div>
        <h3>${escapeHtml(r.customerName)}</h3>
        <div class="meta"><i class="fas fa-phone"></i> ${escapeHtml(r.customerPhone)}</div>
        <div class="meta"><i class="fas fa-file-pdf"></i> ${escapeHtml(r.fileName)} (${r.fileSize})</div>
        ${r.instructions ? `<div class="meta"><i class="fas fa-comment"></i> ${escapeHtml(r.instructions)}</div>` : ''}
        <div class="specs">
          <span class="chip">${r.copies} copies</span>
          <span class="chip">${r.paperSize}</span>
          <span class="chip">${r.printType}</span>
          <span class="chip">${r.printStyle}</span>
          ${r.bindingRequired ? '<span class="chip">Binding</span>' : ''}
          ${r.laminationRequired ? '<span class="chip">Lamination</span>' : ''}
        </div>
        <div class="actions">
          <select class="status" data-id="${r.requestId}">
            ${['Pending','In Progress','Ready','Completed','Cancelled'].map(s =>
              `<option value="${s}" ${s === r.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
          <a class="icon-btn" href="${BACKEND_URL}${r.fileUrl}" target="_blank" title="View/Download PDF"><i class="fas fa-download"></i></a>
          <button class="icon-btn danger" data-del="${r.requestId}" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');

    cardsEl.querySelectorAll('select.status').forEach(sel => {
      sel.addEventListener('change', () => updateStatus(sel.dataset.id, sel.value));
    });
    cardsEl.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => deleteRequest(btn.dataset.del));
    });
  }

  async function updateStatus(requestId, status) {
    try {
      await fetch(`${BACKEND_URL}/api/print-requests/${requestId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ status })
      });
      const r = allRequests.find(x => x.requestId === requestId);
      if (r) r.status = status;
      renderStats();
      renderCards();
    } catch (err) {
      alert('Status update failed: ' + err.message);
    }
  }

  async function deleteRequest(requestId) {
    if (!confirm(`Delete request ${requestId}? This also deletes the PDF file.`)) return;
    try {
      await fetch(`${BACKEND_URL}/api/print-requests/${requestId}`, {
        method: 'DELETE',
        headers: { 'x-admin-key': adminKey }
      });
      allRequests = allRequests.filter(x => x.requestId !== requestId);
      renderStats();
      renderCards();
    } catch (err) {
      alert('Delete failed: ' + err.message);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
